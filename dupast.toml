# dupast configuration file
# Copy this to dupast.toml in your project root

# Similarity threshold (0.0 - 1.0)
# Pairs with similarity below this threshold will not be reported
threshold = 0.90

# Paths to scan when no CLI PATHS are provided
# Supports files or directories, relative to current working directory
paths = ["src"]

# Minimum tokens to consider as duplicate code block
# Blocks (functions, statements) with fewer tokens than this will be ignored
# Higher values reduce noise for very small functions
min_block_lines = 25

# Ignore paths (glob patterns)
# These paths will be skipped during scanning
ignore = [
    "vendor/**",
    "build/**",
    "build_*/**",
    "cmake-build-*/**",
    "dist/**",
    "**/build/**",
    "**/_deps/**",
    "**/generated/*.cpp",
    "**/generated/*.cc",
    "**/generated/*.hpp",
    "**/generated/*.h",
    "third_party/**",
    "external/**",
    "3dparty/**",
]

# Check intra-file duplication
# When true, also detects duplicates within the same file
check_intra_file = true

# Output format
# Options: "human", "json", "sarif"
output_format = "human"

# File extensions to scan
extensions = ["cpp", "cc", "cxx", "hpp", "h", "hxx"]

# Maximum file size to process in bytes (default: 1MB)
# Larger files are skipped to avoid memory issues
max_file_size = 1_048_576

# Number of parallel jobs (default: number of CPU cores)
# Set to 1 to disable parallelism
jobs = 0

# Frequency penalty for token similarity (0.0 - 10.0)
# Higher values penalize common tokens more heavily
# 0.0 = no penalty (pure TF-IDF cosine similarity)
# 1.0 = light penalty
# 2.0 = moderate penalty (default) - good for general use
# 5.0+ = strong penalty - only unique/rare tokens contribute to similarity
# This helps distinguish structural similarity from common boilerplate code
frequency_penalty = 2.0

# Enable fuzzy identifier matching using semantic vectors
# When true, detects similarity even when identifiers are renamed
# Example: calculateSum(a, b) ≈ computeSum(x, y) via semantic similarity
# Uses 4096-dim character n-gram embeddings for identifier names
fuzzy_identifiers = false

# Minimum similarity threshold for fuzzy identifier matching (0.0 - 1.0)
# Only applies when fuzzy_identifiers = true
# 0.5 = very permissive (many matches)
# 0.6 = moderate (default) - balances recall and precision
# 0.8 = strict (only very similar names)
fuzzy_identifier_threshold = 0.6
